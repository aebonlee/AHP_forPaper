services:
  - type: web
    name: ahp-backend
    env: node
    plan: starter
    region: oregon
    buildCommand: cd backend && npm ci && npm run build
    startCommand: cd backend && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: ahp-postgres
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://aebonlee.github.io

  - type: web
    name: ahp-frontend-render
    env: static
    plan: starter
    region: oregon
    buildCommand: cd frontend && npm ci && REACT_APP_API_URL=https://ahp-backend.onrender.com npm run build
    staticPublishPath: frontend/build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: ahp-postgres
    databaseName: ahp_db
    user: ahp_user
    plan: starter
    region: oregon