services:
  - type: web
    name: ahp-backend
    env: node
    region: singapore
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && npm start
    plan: starter
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: ahp-postgres-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET  
        generateValue: true
      - key: CORS_ORIGIN
        value: https://aebonlee.github.io
      
databases:
  - name: ahp-postgres-db
    databaseName: ahp_decision_system
    user: ahp_admin
    plan: starter
